<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔐 Escape Room Metodológico — La Tesis Perdida</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:#030712;color:#e5e7eb;min-height:100vh;min-height:100dvh;overflow-x:hidden}
.heading{font-family:'Playfair Display',serif}
button{cursor:pointer;border:none;font-family:inherit}
select{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(234,179,8,0.3)}50%{box-shadow:0 0 25px rgba(234,179,8,0.6)}}
.fade-in{animation:fadeIn 0.4s ease-out}
.pulse{animation:pulse 1.5s infinite}
.bounce{animation:bounce 1s infinite}
.glow{animation:glow 2s infinite}
.card{background:rgba(17,24,39,0.6);border:1px solid #374151;border-radius:12px;padding:16px}
.btn{padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,#991b1b,#dc2626);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#b91c1c,#ef4444)}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#3b82f6}
.btn-green{background:#059669;color:#fff}.btn-green:hover{background:#10b981}
.btn-orange{background:#d97706;color:#fff}.btn-orange:hover{background:#f59e0b}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#8b5cf6}
.btn-yellow{background:linear-gradient(135deg,#b45309,#eab308);color:#000}
.btn-yellow:hover{background:linear-gradient(135deg,#d97706,#facc15)}
.chip{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:all 0.2s;background:#1f2937;color:#6b7280;border:1px solid #374151}
.chip:hover{background:#374151}
.chip.active-blue{background:#1e40af;color:#fff;border-color:#3b82f6}
.chip.active-green{background:#065f46;color:#fff;border-color:#10b981}
.chip.active-yellow{background:#78350f;color:#fbbf24;border-color:#f59e0b}
.chip.active-red{background:#7f1d1d;color:#fca5a5;border-color:#ef4444}
.feedback{padding:12px;border-radius:10px;font-size:13px;line-height:1.5}
.feedback-ok{background:rgba(6,78,59,0.4);border:1px solid #065f46;color:#6ee7b7}
.feedback-err{background:rgba(127,29,29,0.3);border:1px solid #7f1d1d;color:#fca5a5}
.letter-box{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;border:2px solid;transition:all 0.3s}
.progress-bar{height:4px;background:#1f2937;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s}
.station-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;transition:all 0.2s;border:1px solid #374151;background:rgba(17,24,39,0.5);text-align:left;width:100%}
.station-card:not(:disabled):hover{border-color:#6b7280}
.station-card:not(:disabled):active{transform:scale(0.98)}
.station-card:disabled{opacity:0.4}
.data-row{display:flex;align-items:flex-start;gap:8px;padding:10px;background:rgba(17,24,39,0.4);border-radius:8px;margin-bottom:6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const STATIONS=[
  {id:1,name:"El Escritorio",icon:"🔍",theme:"Tipo de investigación",color:"#3498DB",letter:"T"},
  {id:2,name:"El Archivo",icon:"📁",theme:"Población y muestra",color:"#E74C3C",letter:"E"},
  {id:3,name:"El Laboratorio",icon:"🔬",theme:"Técnicas e instrumentos",color:"#2ECC71",letter:"Z"},
  {id:4,name:"La Pizarra",icon:"📊",theme:"Datos cuanti vs. cuali",color:"#F39C12",letter:"I"},
  {id:5,name:"El Computador",icon:"💻",theme:"Diseño metodológico",color:"#9B59B6",letter:"S"},
];

function Station1({onComplete}){
  const[a,setA]=useState({p:"",m:"",q:""});
  const[fb,setFb]=useState(null);
  const check=()=>{
    const ok=a.p==="positivista"&&a.m==="descriptiva"&&a.q==="si";
    if(ok){setFb({ok:true,msg:"¡Correcto! Positivista (mide datos numéricos con SPSS), Descriptiva (el tema ya está estudiado), y el cuantitativo SÍ es correcto (Likert + estadística)."});setTimeout(()=>onComplete(),2500)}
    else{const h=[];if(a.p!=="positivista")h.push("Paradigma: si mide cantidades y usa estadística → ¿interpretativo o positivista?");if(a.m!=="descriptiva")h.push("Modalidad: inventarios es un tema conocido → ¿exploratoria o descriptiva?");if(a.q!=="si")h.push("Revisen: Likert + SPSS = ¿el cuantitativo está bien?");setFb({ok:false,msg:h.join(" | ")})}
  };
  return(<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    <div style={{background:"#0c1529",border:"1px solid #1e3a5f",borderRadius:"12px",padding:"16px"}}>
      <p style={{color:"#93c5fd",fontSize:"12px",fontWeight:700,marginBottom:"8px"}}>EXTRACTO DE LA TESIS:</p>
      <p style={{color:"#d1d5db",fontSize:"13px",fontStyle:"italic",lineHeight:"1.7"}}>
        "Esta investigación se desarrolla bajo un <span style={{color:"#f87171",fontWeight:700}}>paradigma interpretativo</span> con enfoque cuantitativo y <span style={{color:"#f87171",fontWeight:700}}>modalidad exploratoria</span>. Se busca medir cuántos productos se pierden mensualmente, calcular el porcentaje de error en los registros manuales y determinar el tiempo promedio que tarda un empleado en localizar un producto. Los datos se recolectarán mediante encuestas con escala Likert a 50 microempresarios y se analizarán con estadística descriptiva usando SPSS."
      </p>
    </div>
    <div><p style={{color:"#9ca3af",fontSize:"11px",fontWeight:700,textTransform:"uppercase",marginBottom:"6px"}}>Error 1: El paradigma debería ser:</p>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>{["positivista","interpretativo","socio-crítico"].map(o=><button key={o} onClick={()=>setA(x=>({...x,p:o}))} className={`chip ${a.p===o?"active-blue":""}`}>{o.charAt(0).toUpperCase()+o.slice(1)}</button>)}</div></div>
    <div><p style={{color:"#9ca3af",fontSize:"11px",fontWeight:700,textTransform:"uppercase",marginBottom:"6px"}}>Error 2: La modalidad debería ser:</p>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>{["exploratoria","descriptiva","correlacional","explicativa"].map(o=><button key={o} onClick={()=>setA(x=>({...x,m:o}))} className={`chip ${a.m===o?"active-blue":""}`}>{o.charAt(0).toUpperCase()+o.slice(1)}</button>)}</div></div>
    <div><p style={{color:"#9ca3af",fontSize:"11px",fontWeight:700,textTransform:"uppercase",marginBottom:"6px"}}>¿El enfoque cuantitativo SÍ es correcto?</p>
    <div style={{display:"flex",gap:"8px"}}>{[["si","Sí, es correcto"],["no","No, debería ser otro"]].map(([v,l])=><button key={v} onClick={()=>setA(x=>({...x,q:v}))} className={`chip ${a.q===v?"active-blue":""}`}>{l}</button>)}</div></div>
    <button onClick={check} disabled={!a.p||!a.m||!a.q} className="btn btn-blue" style={{width:"100%",opacity:(!a.p||!a.m||!a.q)?0.4:1}}>🔍 Verificar respuestas</button>
    {fb&&<div className={`feedback ${fb.ok?"feedback-ok":"feedback-err"}`}>{fb.ok?"✅ ":"❌ "}{fb.msg}</div>}
  </div>);
}

function Station2({onComplete}){
  const errors=[{id:"pop",label:"Población: 'Todas las microempresas de Colombia'",correct:true},{id:"size",label:"Tamaño: 'No se especifica'",correct:true},{id:"criteria",label:"Criterios de inclusión/exclusión: 'Ninguno'",correct:true},{id:"sampling",label:"Muestreo: 'Aleatorio simple — las 5 más cercanas'",correct:true},{id:"sample",label:"Muestra: '5 microempresas (15 empleados)'",correct:false},{id:"inst",label:"Instrumento: 'Encuesta con escala Likert'",correct:false}];
  const[sel,setSel]=useState(new Set());
  const[fb,setFb]=useState(null);
  const toggle=id=>{setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})};
  const check=()=>{const correctIds=new Set(errors.filter(e=>e.correct).map(e=>e.id));const ok=sel.size===correctIds.size&&[...sel].every(id=>correctIds.has(id));
    if(ok){setFb({ok:true,msg:"¡Excelente! Los 4 errores: población demasiado amplia, sin cifras, sin criterios, y muestreo es por CONVENIENCIA (no aleatorio — eligió las más cercanas)."});setTimeout(()=>onComplete(),2500)}
    else{const missed=[...correctIds].filter(id=>!sel.has(id));const extra=[...sel].filter(id=>!correctIds.has(id));let h="";if(missed.length)h+=`Faltan ${missed.length} error(es). `;if(extra.length)h+=`${extra.length} campo(s) marcado(s) NO son errores. `;h+="Son exactamente 4.";setFb({ok:false,msg:h})}};
  return(<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
    <p style={{color:"#9ca3af",fontSize:"13px"}}>Seleccionen los campos con ERRORES (exactamente 4):</p>
    {errors.map(e=><button key={e.id} onClick={()=>toggle(e.id)} style={{width:"100%",textAlign:"left",padding:"12px",borderRadius:"10px",fontSize:"13px",transition:"all 0.2s",border:sel.has(e.id)?"1px solid #dc2626":"1px solid #374151",background:sel.has(e.id)?"rgba(127,29,29,0.3)":"rgba(17,24,39,0.4)",color:sel.has(e.id)?"#fca5a5":"#9ca3af"}}><span style={{marginRight:"8px"}}>{sel.has(e.id)?"❌":"○"}</span>{e.label}</button>)}
    <button onClick={check} className="btn" style={{width:"100%",background:"#dc2626",color:"#fff"}}>📁 Verificar ({sel.size}/4)</button>
    {fb&&<div className={`feedback ${fb.ok?"feedback-ok":"feedback-err"}`}>{fb.ok?"✅ ":"💡 "}{fb.msg}</div>}
  </div>);
}

function Station3({onComplete}){
  const insts=[{id:1,name:"Cuestionario Likert",ans:"cuanti"},{id:2,name:"Entrevista semiestructurada",ans:"cuali"},{id:3,name:"Ficha de observación",ans:"ambos"},{id:4,name:"Grupo focal",ans:"cuali"},{id:5,name:"Revisión documental",ans:"ambos"},{id:6,name:"Checklist de pruebas",ans:"cuanti"},{id:7,name:"Diario de campo",ans:"cuali"},{id:8,name:"Formulario de registro",ans:"cuanti"}];
  const[cl,setCl]=useState({});const[inc,setInc]=useState("");const[fb,setFb]=useState(null);
  const cats=[{k:"cuanti",l:"Cuanti",c:"blue"},{k:"cuali",l:"Cuali",c:"green"},{k:"ambos",l:"Ambos",c:"yellow"}];
  const check=()=>{if(Object.keys(cl).length<8){setFb({ok:false,msg:"Clasifiquen los 8 instrumentos."});return}if(!inc){setFb({ok:false,msg:"Respondan sobre la incoherencia."});return}
    let ok=0;insts.forEach(i=>{if(cl[i.id]===i.ans)ok++});const incOk=inc==="mixto";
    if(ok>=6&&incOk){setFb({ok:true,msg:`${ok}/8 correctos. La incoherencia se resuelve con enfoque MIXTO (Likert=cuantitativo + entrevista/grupo focal=cualitativo).`});setTimeout(()=>onComplete(),2500)}
    else{let h=`${ok}/8 correctos. `;if(!incOk)h+="Si usa Likert + entrevistas, ¿qué enfoque combina ambos?";setFb({ok:false,msg:h})}};
  return(<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    <p style={{color:"#9ca3af",fontSize:"12px"}}>Clasifiquen cada instrumento:</p>
    {insts.map(i=><div key={i.id} style={{display:"flex",alignItems:"center",gap:"8px",background:"rgba(17,24,39,0.4)",borderRadius:"8px",padding:"8px"}}>
      <span style={{color:"#d1d5db",fontSize:"12px",flex:1}}>{i.name}</span>
      <div style={{display:"flex",gap:"4px",flexShrink:0}}>{cats.map(c=><button key={c.k} onClick={()=>setCl(p=>({...p,[i.id]:c.k}))} className={`chip ${cl[i.id]===c.k?`active-${c.c}`:""}`} style={{padding:"4px 8px",fontSize:"11px"}}>{c.l}</button>)}</div>
    </div>)}
    <div style={{background:"rgba(127,29,29,0.2)",border:"1px solid #450a0a",borderRadius:"10px",padding:"12px"}}>
      <p style={{color:"#fca5a5",fontSize:"12px",fontWeight:700,marginBottom:"8px"}}>Helena declaró CUANTITATIVO pero usa entrevistas y grupo focal. ¿Solución?</p>
      <div style={{display:"flex",gap:"8px"}}>{["cuantitativo","cualitativo","mixto"].map(o=><button key={o} onClick={()=>setInc(o)} className={`chip ${inc===o?"active-green":""}`} style={{fontSize:"12px"}}>{o.charAt(0).toUpperCase()+o.slice(1)}</button>)}</div>
    </div>
    <button onClick={check} className="btn btn-green" style={{width:"100%"}}>🔬 Verificar</button>
    {fb&&<div className={`feedback ${fb.ok?"feedback-ok":"feedback-err"}`}>{fb.ok?"✅ ":"💡 "}{fb.msg}</div>}
  </div>);
}

function Station4({onComplete}){
  const data=[{id:"A",text:"El 72% no usa software para inventario.",ans:"cuanti"},{id:"B",text:"\"Los computadores son muy complicados\" — Don Pedro",ans:"cuali"},{id:"C",text:"Tiempo promedio sin sistema: 4.7 min. Con sistema: 0.3 min.",ans:"cuanti"},{id:"D",text:"\"Me da miedo perder toda la información\" — María",ans:"cuali"},{id:"E",text:"De 50 microempresas: 36 reportan pérdidas mensuales.",ans:"cuanti"},{id:"F",text:"Los empleados expresan frustración por la lentitud.",ans:"cuali"},{id:"G",text:"Pérdidas promedio: $850.000 COP (DE: $230.000).",ans:"cuanti"},{id:"H",text:"\"Mi vecino puso el sistema y le va mejor\" — Doña Rosa",ans:"cuali"}];
  const[a,setA]=useState({});const[fb,setFb]=useState(null);
  const check=()=>{if(Object.keys(a).length<8){setFb({ok:false,msg:"Clasifiquen los 8 datos."});return}
    let ok=0;data.forEach(d=>{if(a[d.id]===d.ans)ok++});
    if(ok>=6){setFb({ok:true,msg:`${ok}/8 correctos. Cuantitativos=números (%, promedios, frecuencias). Cualitativos=testimonios y percepciones.`});setTimeout(()=>onComplete(),2500)}
    else{setFb({ok:false,msg:`${ok}/8. Pista: datos con números → 📊 cuantitativo. Testimonios entre comillas → 💬 cualitativo.`})}};
  return(<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"6px"}}>
    <p style={{color:"#9ca3af",fontSize:"12px"}}>📊 = Cuantitativo | 💬 = Cualitativo</p>
    {data.map(d=><div key={d.id} className="data-row">
      <span style={{color:"#f59e0b",fontWeight:700,fontSize:"12px",flexShrink:0}}>{d.id}:</span>
      <p style={{color:"#d1d5db",fontSize:"12px",flex:1,lineHeight:"1.5"}}>{d.text}</p>
      <div style={{display:"flex",gap:"4px",flexShrink:0}}>
        <button onClick={()=>setA(p=>({...p,[d.id]:"cuanti"}))} style={{padding:"4px 8px",borderRadius:"6px",fontSize:"14px",border:"none",transition:"all 0.2s",background:a[d.id]==="cuanti"?"#2563eb":"#1f2937",cursor:"pointer"}}>📊</button>
        <button onClick={()=>setA(p=>({...p,[d.id]:"cuali"}))} style={{padding:"4px 8px",borderRadius:"6px",fontSize:"14px",border:"none",transition:"all 0.2s",background:a[d.id]==="cuali"?"#059669":"#1f2937",cursor:"pointer"}}>💬</button>
      </div>
    </div>)}
    <button onClick={check} className="btn btn-orange" style={{width:"100%"}}>📊 Verificar ({Object.keys(a).length}/8)</button>
    {fb&&<div className={`feedback ${fb.ok?"feedback-ok":"feedback-err"}`}>{fb.ok?"✅ ":"💡 "}{fb.msg}</div>}
  </div>);
}

function Station5({onComplete}){
  const phases=["Analizar","Diseñar","Codificar","Verificar","Implementar"];
  const opts=[{v:"",l:"Seleccionar..."},{v:"A",l:"OE-A: Analizar requerimientos..."},{v:"D",l:"OE-D: Diseñar arquitectura UML..."},{v:"C",l:"OE-C: Codificar módulos Java..."},{v:"V",l:"OE-V: Verificar con pruebas..."},{v:"I",l:"OE-I: Implementar y capacitar..."}];
  const correct=["A","D","C","V","I"];
  const[sel,setSel]=useState(["","","","",""]);const[fb,setFb]=useState(null);
  const set=(i,v)=>{const n=[...sel];n[i]=v;setSel(n)};
  const check=()=>{if(sel.some(s=>!s)){setFb({ok:false,msg:"Completen todas las fases."});return}
    const ok=sel.every((s,i)=>s===correct[i]);
    if(ok){setFb({ok:true,msg:"¡Perfecto! Analizar(A)→Diseñar(D)→Codificar(C)→Verificar(V)→Implementar(I)"});setTimeout(()=>onComplete(),2500)}
    else{let w=[];sel.forEach((s,i)=>{if(s!==correct[i])w.push(phases[i])});setFb({ok:false,msg:`Error en: ${w.join(", ")}. Piensen en el orden lógico del ciclo de vida.`})}};
  return(<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <p style={{color:"#9ca3af",fontSize:"13px"}}>Asignen el OE correcto a cada fase:</p>
    {phases.map((ph,i)=><div key={i} style={{background:"rgba(17,24,39,0.4)",borderRadius:"10px",padding:"12px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
        <span style={{background:"#6d28d9",color:"#fff",fontSize:"11px",fontWeight:700,padding:"2px 8px",borderRadius:"4px"}}>{i+1}</span>
        <span style={{color:"#c4b5fd",fontWeight:700,fontSize:"14px"}}>{ph}</span>
      </div>
      <select value={sel[i]} onChange={e=>set(i,e.target.value)} style={{width:"100%",background:"#111827",border:"1px solid #374151",color:"#d1d5db",fontSize:"12px",borderRadius:"8px",padding:"8px",outline:"none"}}>
        {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
    </div>)}
    <button onClick={check} className="btn btn-purple" style={{width:"100%"}}>💻 Verificar ensamblaje</button>
    {fb&&<div className={`feedback ${fb.ok?"feedback-ok":"feedback-err"}`}>{fb.ok?"✅ ":"💡 "}{fb.msg}</div>}
  </div>);
}

function App(){
  const[screen,setScreen]=useState("intro");
  const[curSt,setCurSt]=useState(null);
  const[done,setDone]=useState(new Set());
  const[letters,setLetters]=useState([]);
  const[timer,setTimer]=useState(0);
  const[active,setActive]=useState(false);
  const[reveal,setReveal]=useState(null);
  const[guess,setGuess]=useState("");
  const[gfb,setGfb]=useState(null);

  useEffect(()=>{let iv;if(active)iv=setInterval(()=>setTimer(t=>t+1),1000);return()=>clearInterval(iv)},[active]);
  const fmt=t=>`${Math.floor(t/60)}:${String(t%60).padStart(2,"0")}`;

  const completeSt=useCallback(id=>{
    const st=STATIONS.find(s=>s.id===id);
    setDone(p=>new Set([...p,id]));setLetters(p=>[...p,st.letter]);setReveal(st);
    setTimeout(()=>{setReveal(null);if(done.size+1>=5)setScreen("assembly");else setScreen("map")},2500);
  },[done]);

  const checkWord=()=>{if(guess.toUpperCase()==="TEZIS"){setActive(false);setScreen("victory")}else{setGfb("Esa no es la palabra. Ordenen las letras.")}};

  const stComps={1:Station1,2:Station2,3:Station3,4:Station4,5:Station5};

  // Letter reveal
  if(reveal){return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}} className="fade-in">
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:"60px",marginBottom:"16px"}}>{reveal.icon}</div>
      <p style={{color:"#9ca3af",fontSize:"13px",marginBottom:"4px"}}>Estación {reveal.id} completada</p>
      <p style={{color:"#6b7280",fontSize:"11px",textTransform:"uppercase",letterSpacing:"3px",marginBottom:"16px"}}>Letra obtenida:</p>
      <div className="glow" style={{width:"80px",height:"80px",margin:"0 auto 20px",borderRadius:"14px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"42px",fontWeight:900,border:`3px solid ${reveal.color}`,color:reveal.color,background:reveal.color+"15"}}>{reveal.letter}</div>
      <div style={{display:"flex",justifyContent:"center",gap:"8px"}}>
        {STATIONS.map(s=>{const has=letters.includes(s.letter)||s.id===reveal.id;return(
          <div key={s.id} className="letter-box" style={{width:"36px",height:"36px",fontSize:"16px",borderColor:has?"#eab308":"#374151",background:has?"rgba(234,179,8,0.1)":"#1f2937",color:has?"#eab308":"#4b5563"}}>{has?s.letter:"?"}</div>
        )})}
      </div>
    </div>
  </div>)}

  // Intro
  if(screen==="intro"){return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(to bottom,#030712,#1a0a25,#030712)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
    <div style={{maxWidth:"440px",width:"100%"}} className="fade-in">
      <div style={{textAlign:"center",marginBottom:"24px"}}>
        <div style={{fontSize:"56px",marginBottom:"12px"}}>🔐</div>
        <h1 className="heading" style={{fontSize:"28px",color:"#eab308",marginBottom:"4px"}}>ESCAPE ROOM METODOLÓGICO</h1>
        <p style={{color:"#9ca3af",fontStyle:"italic"}}>"La Tesis Perdida"</p>
      </div>
      <div className="card" style={{borderColor:"#450a0a",marginBottom:"16px"}}>
        <p style={{color:"#f87171",fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>📋 Reporte de incidente</p>
        <p style={{color:"#d1d5db",fontSize:"13px",marginBottom:"6px"}}><span style={{color:"#6b7280"}}>Involucrada:</span> Dra. Helena Martínez</p>
        <p style={{color:"#d1d5db",fontSize:"13px",marginBottom:"6px"}}><span style={{color:"#6b7280"}}>Situación:</span> Desapareció antes de sustentar su tesis</p>
        <p style={{color:"#d1d5db",fontSize:"13px"}}><span style={{color:"#6b7280"}}>Evidencia:</span> 5 estaciones con errores metodológicos</p>
      </div>
      <div className="card" style={{borderColor:"#78350f",marginBottom:"24px"}}>
        <p style={{color:"rgba(234,179,8,0.7)",fontSize:"13px",fontStyle:"italic",lineHeight:"1.7"}}>
          "Si están leyendo esto, es porque ya notaron mi ausencia. Dejé fragmentos de mi tesis en 5 estaciones. Cada fragmento tiene errores. Si logran corregirlos, encontrarán una LETRA CLAVE por estación. Las 5 letras forman una palabra que revela dónde estoy."
        </p>
        <p style={{color:"#eab308",fontSize:"13px",fontWeight:700,textAlign:"right",marginTop:"10px"}}>— Dra. Helena</p>
      </div>
      <button onClick={()=>{setScreen("map");setActive(true)}} className="btn btn-primary" style={{width:"100%",fontSize:"16px",padding:"16px"}}>🔓 INICIAR INVESTIGACIÓN</button>
    </div>
  </div>)}

  // Map
  if(screen==="map"){return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(to bottom,#030712,#111827)",padding:"16px"}}>
    <div style={{maxWidth:"440px",margin:"0 auto"}} className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <div><h2 className="heading" style={{color:"#eab308",fontSize:"18px"}}>Oficina de la Dra. Helena</h2><p style={{color:"#6b7280",fontSize:"12px"}}>{done.size}/5 estaciones</p></div>
        <div style={{background:"#1f2937",borderRadius:"8px",padding:"6px 12px"}}><span style={{color:"#fff",fontFamily:"monospace",fontWeight:700}}>{fmt(timer)}</span></div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"16px"}}>
        {STATIONS.map(s=><div key={s.id} className="letter-box" style={{borderColor:done.has(s.id)?"#eab308":"#374151",background:done.has(s.id)?"rgba(234,179,8,0.1)":"#1f2937",color:done.has(s.id)?"#eab308":"#4b5563"}}>{done.has(s.id)?s.letter:"?"}</div>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {STATIONS.map(s=>{const d=done.has(s.id);return(
          <button key={s.id} onClick={()=>{if(!d){setCurSt(s.id);setScreen("station")}}} disabled={d} className="station-card" style={{opacity:d?0.35:1}}>
            <div style={{fontSize:"28px"}}>{s.icon}</div>
            <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{color:"#fff",fontWeight:700,fontSize:"14px"}}>{s.name}</span>{d&&<span style={{color:"#10b981",fontSize:"12px"}}>✅</span>}</div><p style={{color:"#6b7280",fontSize:"12px"}}>{s.theme}</p></div>
            <div style={{width:"32px",height:"32px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,background:d?"#1f2937":s.color+"25",color:d?"#555":s.color,border:`2px solid ${d?"#333":s.color}`}}>{d?"✓":s.id}</div>
          </button>
        )})}
      </div>
      {done.size===5&&<button onClick={()=>setScreen("assembly")} className="btn btn-yellow glow" style={{width:"100%",marginTop:"16px",fontSize:"16px",padding:"14px"}}>🧩 ENSAMBLAR PALABRA SECRETA</button>}
    </div>
  </div>)}

  // Station
  if(screen==="station"&&curSt){const st=STATIONS.find(s=>s.id===curSt);const StComp=stComps[curSt];return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(to bottom,#030712,#111827)",padding:"16px"}}>
    <div style={{maxWidth:"440px",margin:"0 auto"}} className="fade-in">
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
        <button onClick={()=>setScreen("map")} style={{color:"#6b7280",fontSize:"13px",background:"none",border:"none",padding:"4px"}}>← Mapa</button>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:"22px"}}>{st.icon}</span><span style={{fontWeight:700,color:"#fff",fontSize:"14px"}}>{st.name}</span></div><p style={{fontSize:"11px",color:st.color}}>{st.theme}</p></div>
        <div style={{background:"#1f2937",borderRadius:"6px",padding:"4px 8px"}}><span style={{color:"#fff",fontFamily:"monospace",fontSize:"13px"}}>{fmt(timer)}</span></div>
      </div>
      <div className="progress-bar" style={{marginBottom:"16px"}}><div className="progress-fill" style={{width:`${(done.size/5)*100}%`,background:st.color}}/></div>
      <StComp onComplete={()=>completeSt(curSt)}/>
    </div>
  </div>)}

  // Assembly
  if(screen==="assembly"){return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(to bottom,#030712,#1a0a25,#030712)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
    <div style={{maxWidth:"440px",width:"100%",textAlign:"center"}} className="fade-in">
      <div style={{fontSize:"56px",marginBottom:"8px"}}>🧩</div>
      <h2 className="heading" style={{fontSize:"24px",color:"#eab308",marginBottom:"8px"}}>ENSAMBLEN LA PALABRA</h2>
      <p style={{color:"#9ca3af",fontSize:"13px",marginBottom:"20px"}}>Ordenen las {letters.length} letras para descifrar la palabra secreta.</p>
      <div style={{display:"flex",justifyContent:"center",gap:"10px",marginBottom:"24px"}}>
        {[0,1,2,3,4].map(i=><div key={i} className={`letter-box ${letters[i]?"glow":""}`} style={{width:"52px",height:"52px",fontSize:"24px",borderColor:letters[i]?"#eab308":"#374151",background:letters[i]?"rgba(234,179,8,0.1)":"#1f2937",color:letters[i]?"#eab308":"#4b5563"}}>{letters[i]||"?"}</div>)}
      </div>
      <div style={{display:"flex",gap:"10px",marginBottom:"16px"}}>
        <input type="text" value={guess} onChange={e=>setGuess(e.target.value)} maxLength={5} placeholder="Escriban la palabra..."
          style={{flex:1,background:"#111827",border:"1px solid #374151",color:"#fff",textAlign:"center",fontSize:"18px",fontWeight:700,borderRadius:"10px",padding:"12px",textTransform:"uppercase",letterSpacing:"4px",outline:"none"}}/>
        <button onClick={checkWord} className="btn btn-yellow" style={{padding:"12px 20px",fontSize:"18px"}}>🔓</button>
      </div>
      {gfb&&<p style={{color:"#f87171",fontSize:"13px"}}>{gfb}</p>}
    </div>
  </div>)}

  // Victory
  if(screen==="victory"){return(<div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(to bottom,#030712,#052e16,#030712)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
    <div style={{maxWidth:"440px",width:"100%",textAlign:"center"}} className="fade-in">
      <div className="bounce" style={{fontSize:"64px",marginBottom:"12px"}}>🔓</div>
      <h1 className="heading" style={{fontSize:"36px",color:"#eab308",marginBottom:"4px"}}>ТЕЗИС</h1>
      <p style={{color:"#9ca3af",fontSize:"15px",marginBottom:"20px"}}>= TEZIS = "Tesis" en ruso</p>
      <div className="card" style={{textAlign:"left",marginBottom:"20px"}}>
        <p style={{color:"#d1d5db",fontSize:"13px",fontStyle:"italic",lineHeight:"1.7"}}>"No fui yo quien se perdió... fue mi metodología. Si ustedes corrigen la suya a tiempo, no les pasará lo mismo."</p>
        <p style={{color:"#eab308",fontSize:"13px",fontWeight:700,textAlign:"right",marginTop:"8px"}}>— Dra. Helena Martínez</p>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"16px",marginBottom:"20px"}}>
        <div style={{background:"#1f2937",borderRadius:"10px",padding:"12px 24px"}}><p style={{color:"#6b7280",fontSize:"11px"}}>Tiempo</p><p style={{color:"#fff",fontSize:"22px",fontWeight:700}}>{fmt(timer)}</p></div>
        <div style={{background:"#1f2937",borderRadius:"10px",padding:"12px 24px"}}><p style={{color:"#6b7280",fontSize:"11px"}}>Estaciones</p><p style={{color:"#10b981",fontSize:"22px",fontWeight:700}}>{done.size}/5</p></div>
      </div>
      <div className="card" style={{borderColor:"#1e3a5f",textAlign:"left",marginBottom:"20px"}}>
        <p style={{color:"#93c5fd",fontSize:"13px",fontWeight:700,marginBottom:"6px"}}>📋 AHORA: AUTODIAGNÓSTICO</p>
        <p style={{color:"#9ca3af",fontSize:"12px",lineHeight:"1.6"}}>Apliquen estas correcciones a SU proyecto de aula: ¿Su paradigma es coherente? ¿Su población tiene cifras? ¿Sus instrumentos van con su enfoque?</p>
      </div>
      <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",background:"#1f2937",color:"#9ca3af",borderRadius:"8px",fontSize:"13px",border:"1px solid #374151",cursor:"pointer"}}>🔄 Volver a jugar</button>
    </div>
  </div>)}

  return null;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
